services:
  spark-master:
    image: ${SPARK_IMAGE}
    platform: ${PLATFORM}
    container_name: ${MASTER_NAME}
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
    ports:
      - "${SPARK_MASTER_UI_PORT}:8080"
      - "${SPARK_MASTER_RPC_PORT}:7077"
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD-SHELL", "bash -c '< /dev/tcp/localhost/8080' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - spark-network

  spark-worker:
    image: ${SPARK_IMAGE}
    platform: ${PLATFORM}
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://${MASTER_NAME}:7077
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_WORKER_CORES=${WORKER_CORES}
      - SPARK_WORKER_MEMORY=${WORKER_MEMORY}
    volumes:
      - ./data:/data
    depends_on:
      spark-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c '< /dev/tcp/localhost/8081' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - spark-network

  jupyter:
    image: ${JUPYTER_IMAGE}
    container_name: ${JUPYTER_NAME}
    ports:
      - "${JUPYTER_PORT}:8888"
      - "${JUPYTER_PORT2}:4040"  # Spark Application UI
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./data:/data
    environment:
      - SPARK_MASTER=spark://${MASTER_NAME}:7077
      - JUPYTER_TOKEN=${JUPYTER_TOKEN}
      - PYSPARK_PYTHON=python3
      - PYSPARK_DRIVER_PYTHON=python3
    depends_on:
      spark-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f jupyter || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - spark-network
    user: root

networks:
  spark-network:
    driver: bridge